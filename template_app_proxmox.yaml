        - uuid: c0dc284fecd246c7876a3b80b25fc6ff
          name: 'HA: Quorum'
          type: DEPENDENT
          key: proxmox.ha.quorum
          delay: '0'
          description: 'Whether the HA cluster currently has quorum.'
          valuemap:
            name: 'HA quorate'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  if (!data || data.length === 0) return '';
                  for (var i = 0; i < data.length; i++) {
                    if (data[i].type === 'quorum') return data[i].quorate ? 1 : 0;
                  }
                  return '';
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: proxmox.ha.status.get
          tags:
            - tag: component
              value: ha
          triggers:
            - uuid: 3f30a1b17441487d890b6fc8c18427e3
