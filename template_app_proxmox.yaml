              name: 'Proxmox VE: Guests not covered by backup'
              event_name: 'Proxmox VE: {ITEM.LASTVALUE1} guest(s) not covered by any backup job'
              priority: WARNING
              description: 'There are guests in the cluster that are not included in any backup job.'
              tags:
