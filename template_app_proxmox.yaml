              type: DEPENDENT
              key: 'proxmox.node.cert.notafter.soonest[{#NODE.NAME}]'
              delay: '0'
              units: unixtime
              description: 'The earliest expiry date among all certificates on the node {#NODE.NAME}.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value).data;
                      var soonest = Infinity;
                      for (var i = 0; i < data.length; i++) {
                        if (typeof data[i].notafter !== 'undefined' && data[i].notafter < soonest) {
                          soonest = data[i].notafter;
                        }
                      }
                      return soonest === Infinity ? 0 : soonest;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: 'proxmox.node.certs.get[{#NODE.NAME}]'
