        - uuid: b8428ea806f648a8aa711af496fd785e
          name: 'Backup: Guests not backed up list'
          type: DEPENDENT
          key: proxmox.backup.notbackedup.list
          delay: '0'
          value_type: TEXT
          description: 'Comma-separated list of guest names/IDs not covered by any backup job.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  if (!data || data.length === 0) return 'None';
                  return data.map(function(g) {
                    return g.type + ':' + g.vmid + (g.name ? ' (' + g.name + ')' : '');
                  }).join(', ');
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: proxmox.backup.notbackedup.get
          tags:
            - tag: component
              value: backup
