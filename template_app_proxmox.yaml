            - uuid: 12a9f44630514b12831af5dd6af7294b
              name: 'Node [{#NODE.NAME}]: SMART status'
              type: SCRIPT
              key: 'proxmox.node.disk.smart[{#NODE.NAME}]'
              delay: 1h
              description: 'Checks SMART health for all disks on the node {#NODE.NAME}. Returns 1 if all healthy, 0 if any disk has a SMART failure. Drives reporting UNKNOWN or missing health data are skipped (e.g. behind RAID controllers or lacking SMART support).'
              valuemap:
                name: 'Disk SMART status'
              params: |
                var params = JSON.parse(value);
                var req = new HttpRequest();
                req.addHeader('Authorization: PVEAPIToken=' + params.token_id + '=' + params.token);
                var base = 'https://' + params.url + ':' + params.port + '/api2/json';

                var disksResp = req.get(base + '/nodes/' + params.node + '/disks/list');
                if (req.getStatus() !== 200) return 1;

                var disks = JSON.parse(disksResp).data;
                for (var i = 0; i < disks.length; i++) {
                  try {
                    var smartResp = req.get(base + '/nodes/' + params.node + '/disks/smart?disk=' + encodeURIComponent(disks[i].devpath));
                    if (req.getStatus() === 200) {
                      var health = JSON.parse(smartResp).data.health;
                      if (health && health !== 'PASSED' && health !== 'OK' && health !== 'UNKNOWN') return 0;
                    }
                  } catch (e) {}
                }
                return 1;
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              timeout: 30s
              parameters:
                - name: node
                  value: '{#NODE.NAME}'
                - name: port
                  value: '{$PVE.URL.PORT}'
                - name: token
                  value: '{$PVE.TOKEN.SECRET}'
                - name: token_id
                  value: '{$PVE.TOKEN.ID}'
                - name: url
                  value: '{$PVE.URL.HOST}'
              tags:
                - tag: component
                  value: disk
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: dec383949ef34b308a37eb3cc456f498
              name: 'Node [{#NODE.NAME}]: Replication status'
              type: SCRIPT
              key: 'proxmox.node.replication.get[{#NODE.NAME}]'
              delay: 5m
              history: '0'
              value_type: TEXT
              trends: '0'
              description: 'Checks replication job status for all jobs on node {#NODE.NAME}. Returns aggregated JSON with job count, error count, max lag, and error details.'
              params: |
                var params = JSON.parse(value);
                var req = new HttpRequest();
                req.addHeader('Authorization: PVEAPIToken=' + params.token_id + '=' + params.token);
                var base = 'https://' + params.url + ':' + params.port + '/api2/json';
                var result = {jobs: 0, errors: 0, max_lag_seconds: 0, error_details: ''};

                var jobsResp = req.get(base + '/nodes/' + params.node + '/replication');
                if (req.getStatus() !== 200) return JSON.stringify(result);

                var jobs = JSON.parse(jobsResp).data;
                if (!jobs || jobs.length === 0) return JSON.stringify(result);
                result.jobs = jobs.length;

                var errorList = [];
                var now = Math.floor(Date.now() / 1000);
                for (var i = 0; i < jobs.length; i++) {
                  try {
                    var statusResp = req.get(base + '/nodes/' + params.node + '/replication/' + jobs[i].id + '/status');
                    if (req.getStatus() === 200) {
                      var st = JSON.parse(statusResp).data;
                      if (st.fail_count && st.fail_count > 0) {
                        result.errors++;
                        errorList.push(jobs[i].id + ': ' + (st.error || 'unknown'));
                      }
                      if (st.last_sync) {
                        var lag = now - st.last_sync;
                        if (lag > result.max_lag_seconds) result.max_lag_seconds = lag;
                      }
                    }
                  } catch (e) {}
                }
                result.error_details = errorList.join('; ');
                return JSON.stringify(result);
              timeout: 30s
              parameters:
                - name: node
                  value: '{#NODE.NAME}'
                - name: port
                  value: '{$PVE.URL.PORT}'
                - name: token
                  value: '{$PVE.TOKEN.SECRET}'
                - name: token_id
                  value: '{$PVE.TOKEN.ID}'
                - name: url
                  value: '{$PVE.URL.HOST}'
              tags:
                - tag: component
                  value: replication
                - tag: node
                  value: '{#NODE.NAME}'
