        - uuid: d193281dc54645adbe076e00c603292c
          name: 'Cluster: Memory utilization'
          type: DEPENDENT
          key: proxmox.cluster.memory.utilization
          delay: '0'
          value_type: FLOAT
          units: '%'
          description: 'Memory utilization percentage across the cluster.'
          preprocessing:
            - type: JAVASCRIPT
