          url: 'https://{$PVE.URL.HOST}:{$PVE.URL.PORT}/api2/json/cluster/status'
          headers:
            - name: Authorization
              value: 'PVEAPIToken={$PVE.TOKEN.ID}={$PVE.TOKEN.SECRET}'
          tags:
            - tag: component
              value: raw
        - uuid: 32778446364146e2b823da2967f9c053
          name: 'Cluster: Nodes online'
          type: DEPENDENT
          key: proxmox.cluster.nodes.online
          delay: '0'
          description: 'Number of online nodes in the cluster.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  var count = 0;
                  for (var i = 0; i < data.length; i++) {
                    if (data[i].type === 'node' && data[i].status === 'online') count++;
                  }
                  return count;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: proxmox.cluster.resources
          tags:
            - tag: component
              value: cluster
        - uuid: 2fd0f3d76a8b415d8d8c4ac1cc7534a0
          name: 'Cluster: Nodes offline'
          type: DEPENDENT
          key: proxmox.cluster.nodes.offline
          delay: '0'
          description: 'Number of offline nodes in the cluster.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  var count = 0;
                  for (var i = 0; i < data.length; i++) {
                    if (data[i].type === 'node' && data[i].status !== 'online') count++;
                  }
                  return count;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: proxmox.cluster.resources
          tags:
            - tag: component
              value: cluster
        - uuid: 9dbf170490524de08c9414852781a5a9
          name: 'Cluster: CPU total'
          type: DEPENDENT
          key: proxmox.cluster.cpu.total
          delay: '0'
          description: 'Total number of CPUs across all nodes in the cluster.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  var total = 0;
                  for (var i = 0; i < data.length; i++) {
                    if (data[i].type === 'node') total += (data[i].maxcpu || 0);
                  }
                  return total;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: proxmox.cluster.resources
          tags:
            - tag: component
              value: cluster
            - tag: component
              value: cpu
        - uuid: b7316ad3cdcf4599892db1bee2ff430d
          name: 'Cluster: CPU utilization'
          type: DEPENDENT
          key: proxmox.cluster.cpu.utilization
          delay: '0'
          value_type: FLOAT
          units: '%'
          description: 'Average CPU utilization across all online nodes in the cluster.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value).data;
                  var cpuSum = 0, nodeCount = 0;
                  for (var i = 0; i < data.length; i++) {
                    if (data[i].type === 'node' && data[i].status === 'online') {
                      cpuSum += (data[i].cpu || 0);
                      nodeCount++;
                    }
                  }
                  return nodeCount > 0 ? Math.round(cpuSum / nodeCount * 10000) / 100 : 0;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: proxmox.cluster.resources
          tags:
            - tag: component
              value: cluster
            - tag: component
              value: cpu
        - uuid: f5abbea8306f49d08fa0396ef31197d0
